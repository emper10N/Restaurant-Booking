<p-card header="Поводы визита (ADMIN)" styleClass="page-card">
  <form [formGroup]="form" (ngSubmit)="create()">
    <div class="grid">
      <label class="col-12 md:col-4">Код (UPPER_CASE) <input class="w-full" formControlName="code" /></label>
      <label class="col-12 md:col-4">Название <input class="w-full" formControlName="displayName" /></label>
      <label class="col-12 md:col-4">Описание <input class="w-full" formControlName="description" /></label>
    </div>
    <button type="submit" class="w-full md:w-auto">Создать повод</button>
  </form>
  <div class="table-scroll">
    <table>
      <thead><tr><th>ID</th><th>Код</th><th>Название</th><th>Статус</th><th>Действия</th></tr></thead>
      <tbody>
        @for (item of reasons(); track item.id) {
          <tr>
            <td>{{ item.id }}</td><td>{{ item.code }}</td><td>{{ item.displayName }}</td><td>{{ item.active ? 'Активен' : 'Неактивен' }}</td>
            <td>
              <div class="flex flex-column sm:flex-row flex-wrap gap-2">
                <button type="button" class="w-full sm:w-auto" (click)="toggle(item)">{{ item.active ? 'Деактивировать' : 'Активировать' }}</button>
                <button type="button" class="w-full sm:w-auto" (click)="remove(item.id)">Удалить</button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</p-card>
