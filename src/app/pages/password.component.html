<p-card header="Смена пароля" styleClass="page-card page-card--narrow mx-auto">
  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>Текущий пароль <input class="w-full" type="password" formControlName="currentPassword" /></label>
    <label>Новый пароль <input class="w-full" type="password" formControlName="newPassword" /></label>
    <label>Подтверждение <input class="w-full" type="password" formControlName="confirmNewPassword" /></label>
    <button type="submit" class="w-full md:w-auto">Обновить пароль</button>
  </form>
</p-card>
